<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MISSUSOBADD</title>
</head>

<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <button id="magicBtn" style="
    background-color: Yellow;
    padding: 4px 8px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
">
<span style="color: Pink; text-transform: lowercase;">Althe</span>
<span style="color: Pink; text-transform: lowercase;">Cutie</span>
</button>

<script>

const images = [
    'url("pic1.jpg")',
    'url("pic2.jpg")',
    'url("pic3.jpg")',
    'url("pic4.jpg")',
    'url("pic5.jpg")'
];


images.forEach(src => {
    new Image().src = src.replace(/url\(\"|\"\)/g, '');
});

document.getElementById("magicBtn").addEventListener("click", function(){
    const randomImage = images[Math.floor(Math.random() * images.length)];
    
    document.body.style.backgroundImage = randomImage;
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundPosition = "center";
    document.body.style.backgroundRepeat = "no-repeat"; // sicty sivin
    document.body.style.transition = "background 0.3s ease"; // 67
});
</script>

  
</body>

</html>
